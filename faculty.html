<!DOCTYPE html>
<html>
<head>
<title>Faculty Explorer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<h2 class="text-3xl font-bold mb-6">📁 Faculty Explorer</h2>

<!-- BACK BUTTON -->
<button onclick="goBack()" id="backBtn"
class="mb-4 bg-gray-700 px-4 py-2 rounded hidden">
⬅ Back
</button>

<input type="text" id="searchInput"
placeholder="Search..."
class="p-2 text-black rounded mb-4 w-full"
onkeyup="searchFiles()">

<div id="explorer" class="space-y-3"></div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyJ6VHquVroeLsHaAl8avwV-ImJda4aR0RsHWDjovqtJLvNsYR4tJtXUp4OIA6s-T9qIw/exec";

let fullData = [];
let currentView = "root";

// LOAD DATA
function loadFiles(){
fetch(WEB_APP_URL)
.then(res => res.json())
.then(data => {
fullData = data;
showRoot();
})
.catch(err=>{
document.getElementById("explorer").innerHTML =
"<p class='text-red-400'>Failed to load data ❌</p>";
});
}

// SHOW ROOT
function showRoot(){

currentView = "root";
document.getElementById("backBtn").classList.add("hidden");

const container = document.getElementById("explorer");
container.innerHTML = "";

if(fullData.length === 0){
container.innerHTML = "<p class='text-gray-400'>No reports found</p>";
return;
}

fullData.forEach(item => {

container.innerHTML += `
<div onclick='openFolder(${JSON.stringify(item)})'
class="bg-gray-800 p-4 rounded cursor-pointer hover:bg-gray-700">

📁 ${item.dept} / ${item.year} / ${item.month} / ${item.event}

</div>
`;

});

}

// OPEN FOLDER
function openFolder(item){

currentView = "folder";
document.getElementById("backBtn").classList.remove("hidden");

const container = document.getElementById("explorer");

container.innerHTML = `
<h3 class="text-xl font-bold mb-4">
📁 ${item.dept} / ${item.year} / ${item.month} / ${item.event}
</h3>

<div class="grid md:grid-cols-2 gap-4">

${item.files.map(file => {

if(file.type.includes("image")){
return `
<div class="bg-black p-2 rounded">
<img src="${file.url}" class="w-full h-40 object-cover rounded">
<p class="text-sm mt-1">${file.name}</p>
</div>`;
}

return `
<div class="flex justify-between items-center bg-white text-black p-2 rounded">
<span>📄 ${file.name}</span>
<a href="${file.url}" target="_blank"
class="bg-blue-500 text-white px-2 py-1 rounded">
Open
</a>
</div>`;
}).join("")}

</div>
`;

}

// BACK
function goBack(){
showRoot();
}

// SEARCH
function searchFiles(){

if(currentView !== "root") return;

const input = document.getElementById("searchInput").value.toLowerCase();
const items = document.querySelectorAll("#explorer > div");

items.forEach(item => {
item.style.display = item.innerText.toLowerCase().includes(input) ? "block" : "none";
});

}

window.onload = loadFiles;

</script>

</body>
</html>
