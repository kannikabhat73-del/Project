<!DOCTYPE html>
<html>
<head>
<title>Faculty Trash</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">

<h2 class="text-3xl font-bold mb-6 flex justify-between items-center">
  🗑 Faculty Trash
  <a href="faculty.html" class="bg-blue-500 px-4 py-2 rounded text-white hover:bg-blue-600">
    Back to Explorer
  </a>
</h2>

<div id="trashContainer" class="space-y-3"></div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyJ6VHquVroeLsHaAl8avwV-ImJda4aR0RsHWDjovqtJLvNsYR4tJtXUp4OIA6s-T9qIw/exec";

// Load faculty deleted files
function loadTrash(){
  fetch(`${WEB_APP_URL}?action=getFacultyTrash`)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("trashContainer");
      if(data.length === 0){
        container.innerHTML = "<p class='text-gray-400 text-center text-xl mt-10'>No deleted files</p>";
        return;
      }

      container.innerHTML = data.map(item => {
        if(item.type.includes("image")){
          return `
            <div class="bg-black p-2 rounded">
              <img src="${item.url}" class="w-full h-40 object-cover rounded">
              <p class="text-sm mt-1 text-center">${item.name}</p>
              <div class="mt-1 flex justify-center gap-2">
                <button onclick='restore("${item.id}")' class="bg-green-500 text-white px-2 py-1 rounded">Restore</button>
                <button onclick='permanentDelete("${item.id}")' class="bg-red-500 text-white px-2 py-1 rounded">Delete Permanently</button>
              </div>
            </div>`;
        }

        return `
          <div class="flex justify-between items-center bg-white text-black p-2 rounded">
            <span>📄 ${item.name}</span>
            <div class="space-x-2">
              <button onclick='restore("${item.id}")' class="bg-green-500 px-2 py-1 rounded text-white">Restore</button>
              <button onclick='permanentDelete("${item.id}")' class="bg-red-500 px-2 py-1 rounded text-white">Delete Permanently</button>
            </div>
          </div>`;
      }).join("");
    })
    .catch(err => {
      document.getElementById("trashContainer").innerHTML = "<p class='text-red-400'>Failed to load trash</p>";
    });
}

// Restore a file/folder
function restore(id){
  fetch(`${WEB_APP_URL}?action=restore&id=${id}`, { method: "POST" })
    .then(() => loadTrash())
    .catch(() => alert("Failed to restore!"));
}

// Delete permanently
function permanentDelete(id){
  if(confirm("Are you sure you want to delete this permanently?")){
    fetch(`${WEB_APP_URL}?action=permanentDelete&id=${id}`, { method: "POST" })
      .then(() => loadTrash())
      .catch(() => alert("Failed to delete permanently!"));
  }
}

// Load on page load
window.onload = loadTrash;
</script>

</body>
</html>
